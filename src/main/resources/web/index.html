<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mkpro - AI Software Engineering Team</title>
    <link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root, [data-theme="dark"] {
            --bg: #1a1b26;
            --surface: #24283b;
            --surface2: #2f3549;
            --text: #c0caf5;
            --text-dim: #565f89;
            --accent: #7aa2f7;
            --green: #9ece6a;
            --yellow: #e0af68;
            --red: #f7768e;
            --purple: #bb9af7;
            --cyan: #7dcfff;
            --orange: #ff9e64;
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface2: #e8e8ec;
            --text: #1d1d1f;
            --text-dim: #86868b;
            --accent: #0066cc;
            --green: #248a3d;
            --yellow: #a05d00;
            --red: #d70015;
            --purple: #7b2d8b;
            --cyan: #0071a4;
            --orange: #c93400;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--surface2);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 { font-size: 16px; color: var(--accent); font-weight: 600; }
        .header .nav-links { margin-left: 16px; display: flex; gap: 12px; }
        .header .nav-links a { color: var(--cyan); text-decoration: none; font-size: 12px; }
        .header .nav-links a:hover { text-decoration: underline; }
        .header .status { font-size: 12px; color: var(--text-dim); margin-left: auto; }
        .header .status.connected { color: var(--green); }
        .header .status.disconnected { color: var(--red); }
        .theme-toggle {
            background: var(--surface2);
            border: 1px solid var(--surface2);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-dim);
            transition: all 0.2s;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

        /* Main layout: sidebar + chat */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* File Browser Sidebar */
        .sidebar {
            width: 250px;
            min-width: 150px;
            max-width: 500px;
            background: var(--surface);
            border-right: 1px solid var(--surface2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.2s;
        }
        .sidebar.collapsed { width: 0; min-width: 0; border-right: none; }
        .sidebar-header {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--surface2);
            flex-shrink: 0;
        }
        .sidebar-header span { font-size: 12px; color: var(--accent); font-weight: 600; }
        .sidebar-toggle {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .sidebar-toggle:hover { background: var(--surface2); color: var(--text); }
        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            font-size: 12px;
        }
        .file-tree::-webkit-scrollbar { width: 4px; }
        .file-tree::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
        .tree-item {
            display: flex;
            align-items: center;
            padding: 3px 12px;
            cursor: pointer;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tree-item:hover { background: var(--surface2); }
        .tree-item.active { background: rgba(122, 162, 247, 0.15); }
        .tree-item .icon { flex-shrink: 0; font-size: 13px; }
        .tree-item .name { overflow: hidden; text-overflow: ellipsis; }
        .tree-item .name.dir { color: var(--cyan); }
        .tree-item .name.file { color: var(--text); }
        .tree-children { display: none; }
        .tree-children.open { display: block; }
        .tree-item .arrow {
            font-size: 10px;
            color: var(--text-dim);
            flex-shrink: 0;
            width: 12px;
            text-align: center;
            transition: transform 0.15s;
        }
        .tree-item .arrow.expanded { transform: rotate(90deg); }
        .sidebar-toggle-external {
            position: absolute;
            left: 4px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--surface2);
            border: 1px solid var(--surface2);
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px 4px;
            border-radius: 0 4px 4px 0;
            font-size: 12px;
            z-index: 10;
            display: none;
        }
        .sidebar.collapsed ~ .chat-container .sidebar-toggle-external { display: block; }

        /* Chat container (right side) */
        .chat-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Resizable Dividers */
        .divider {
            width: 5px;
            cursor: col-resize;
            background: transparent;
            position: relative;
            flex-shrink: 0;
            z-index: 5;
        }
        .divider:hover, .divider.active {
            background: var(--accent);
            opacity: 0.5;
        }
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 1px;
            width: 3px;
            height: 30px;
            transform: translateY(-50%);
            background: var(--text-dim);
            border-radius: 2px;
            opacity: 0;
        }
        .divider:hover::after { opacity: 1; }

        /* Preview Panel (between sidebar and chat) */
        .preview-panel {
            width: 0;
            min-width: 0;
            max-width: 700px;
            background: var(--surface);
            border-right: 1px solid var(--surface2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.2s;
        }
        .preview-panel.open { width: 400px; min-width: 200px; transition: none; }
        .preview-tabs {
            display: flex;
            background: var(--bg);
            border-bottom: 1px solid var(--surface2);
            overflow-x: auto;
            flex-shrink: 0;
        }
        .preview-tabs::-webkit-scrollbar { height: 3px; }
        .preview-tabs::-webkit-scrollbar-thumb { background: var(--surface2); }
        .preview-tab {
            padding: 6px 12px;
            font-size: 11px;
            color: var(--text-dim);
            cursor: pointer;
            white-space: nowrap;
            border-right: 1px solid var(--surface2);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .preview-tab:hover { background: var(--surface2); }
        .preview-tab.active { background: var(--surface); color: var(--accent); border-bottom: 2px solid var(--accent); }
        .preview-tab .close-tab { color: var(--text-dim); font-size: 12px; }
        .preview-tab .close-tab:hover { color: var(--red); }
        .preview-content {
            flex: 1;
            overflow: auto;
            padding: 0;
        }
        .preview-content pre {
            margin: 0;
            padding: 12px;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .preview-content img { max-width: 100%; height: auto; display: block; }
        .preview-content iframe { width: 100%; height: 100%; border: none; }
        .preview-content canvas { width: 100%; height: 100%; }
        .preview-actions {
            padding: 8px 12px;
            border-top: 1px solid var(--surface2);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .preview-actions button {
            padding: 5px 12px;
            border-radius: 4px;
            border: none;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
        }
        .preview-actions .btn-attach { background: var(--green); color: var(--bg); }
        .preview-actions .btn-close-panel { background: var(--surface2); color: var(--text-dim); }

        /* Chat area */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            position: relative;
        }
        .message .timestamp {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
            opacity: 0.7;
        }
        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: #1a1b26;
            border-bottom-right-radius: 4px;
        }
        .message.user .timestamp { color: rgba(26, 27, 38, 0.6); text-align: right; }
        .message.assistant {
            align-self: flex-start;
            background: var(--surface);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--surface2);
        }
        .message.assistant .agent-badge {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--surface2);
            color: var(--cyan);
            margin-bottom: 8px;
        }
        .message.system {
            align-self: center;
            font-size: 12px;
            color: var(--text-dim);
            background: transparent;
            padding: 4px 12px;
        }
        .message.maker {
            align-self: center;
            font-size: 12px;
            color: var(--purple);
            background: rgba(187, 154, 247, 0.1);
            border: 1px solid rgba(187, 154, 247, 0.2);
            padding: 6px 14px;
            border-radius: 8px;
        }
        .message.routing {
            align-self: center;
            font-size: 12px;
            color: var(--cyan);
            background: rgba(125, 207, 255, 0.1);
            border: 1px solid rgba(125, 207, 255, 0.2);
            padding: 4px 12px;
            border-radius: 8px;
        }

        /* Markdown content */
        .message.assistant p { margin-bottom: 8px; }
        .message.assistant p:last-child { margin-bottom: 0; }
        .message.assistant code {
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
        .message.assistant pre {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            overflow-x: auto;
        }
        .message.assistant pre code {
            background: transparent;
            padding: 0;
        }
        .message.assistant ul, .message.assistant ol {
            padding-left: 20px;
            margin: 8px 0;
        }
        .message.assistant h1, .message.assistant h2, .message.assistant h3 {
            color: var(--accent);
            margin: 12px 0 6px 0;
        }
        .message.assistant strong { color: var(--green); }
        .message.assistant a { color: var(--cyan); }

        /* Streaming indicator */
        .streaming .content::after {
            content: '▊';
            animation: blink 0.8s infinite;
            color: var(--accent);
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Loading/thinking indicator */
        .loader {
            align-self: flex-start;
            padding: 12px 20px;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .loader .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.4s ease-in-out infinite;
        }
        .loader .dot:nth-child(2) { animation-delay: 0.2s; }
        .loader .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        .loader .loader-text {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: 8px;
        }

        /* Input area */
        .input-area {
            padding: 12px 20px 16px;
            background: var(--surface);
            border-top: 1px solid var(--surface2);
        }
        .attachments-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            min-height: 0;
        }
        .attachments-bar:empty { display: none; }
        .attachment-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface2);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px;
            color: var(--cyan);
        }
        .attachment-chip .remove {
            cursor: pointer;
            color: var(--red);
            font-weight: bold;
            font-size: 13px;
        }
        .attachment-chip .remove:hover { opacity: 0.7; }
        .attachment-chip.path-only {
            border-color: var(--green);
            color: var(--green);
        }
        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-row input[type="text"] {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--surface2);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input[type="text"]:focus {
            border-color: var(--accent);
        }
        .attach-btn {
            background: var(--surface2);
            border: 1px solid var(--surface2);
            border-radius: 8px;
            padding: 10px 12px;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 18px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        .attach-btn:hover { border-color: var(--accent); color: var(--accent); }
        .send-btn {
            background: var(--accent);
            color: #1a1b26;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .send-btn:hover { opacity: 0.9; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Scrollbar */
        .chat::-webkit-scrollbar { width: 6px; }
        .chat::-webkit-scrollbar-track { background: var(--bg); }
        .chat::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

        /* Hidden file input */
        #fileInput { display: none; }

        /* Diff Viewer */
        .edit-proposal {
            align-self: flex-start;
            max-width: 90%;
            background: var(--surface);
            border: 1px solid var(--yellow);
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
        }
        .edit-proposal .edit-header {
            font-size: 12px;
            color: var(--yellow);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .edit-proposal .diff-view {
            background: var(--bg);
            border-radius: 6px;
            padding: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .edit-proposal .diff-line { white-space: pre-wrap; font-family: inherit; }
        .edit-proposal .diff-line.added { color: var(--green); }
        .edit-proposal .diff-line.removed { color: var(--red); text-decoration: line-through; opacity: 0.8; }
        .edit-proposal .diff-line.info { color: var(--yellow); font-style: italic; }
        .edit-proposal .edit-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .edit-proposal .edit-actions button {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .edit-proposal .btn-approve { background: var(--green); color: var(--bg); }
        .edit-proposal .btn-approve:hover { opacity: 0.9; }
        .edit-proposal .btn-reject { background: var(--red); color: white; }
        .edit-proposal .btn-reject:hover { opacity: 0.9; }
        .edit-proposal .edit-countdown { font-size: 11px; color: var(--text-dim); margin-left: auto; }
        .edit-proposal.resolved { opacity: 0.6; border-color: var(--surface2); }
        .edit-proposal.resolved .edit-actions { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>mkpro</h1>
        <div class="nav-links">
            <a href="/knowledge">🧠 Knowledge</a>
            <a href="/db">📦 DB</a>
        </div>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
        <span class="status disconnected" id="status">● Disconnected</span>
    </div>
    <div class="main-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>📁 Project Files</span>
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="Hide panel">✕</button>
            </div>
            <div class="file-tree" id="fileTree"></div>
        </div>
        <div class="divider" id="divider1"></div>
        <div class="preview-panel" id="previewPanel">
            <div class="preview-tabs" id="previewTabs"></div>
            <div class="preview-content" id="previewContent"></div>
            <div class="preview-actions">
                <button class="btn-attach" onclick="attachPreviewFile()">📎 Attach to Chat</button>
                <button class="btn-close-panel" onclick="closePreviewPanel()">Close Panel</button>
            </div>
        </div>
        <div class="divider" id="divider2"></div>
        <div class="chat-container">
            <button class="sidebar-toggle-external" onclick="toggleSidebar()" title="Show file browser">📁</button>
            <div class="chat" id="chat"></div>
            <div class="input-area">
                <div class="attachments-bar" id="attachments"></div>
                <div class="input-row">
                    <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Attach file">📎</button>
                    <input type="file" id="fileInput" multiple accept=".txt,.java,.py,.js,.ts,.json,.yaml,.yml,.md,.csv,.log,.xml,.html,.css,.sh,.bat,.sql,.groovy,.kt,.swift,.rs,.go,.c,.cpp,.h,.png,.jpg,.jpeg,.gif,.webp" onchange="handleFiles(event)" />
                    <input type="text" id="input" placeholder="Type a message..." autocomplete="off" />
                    <button class="send-btn" id="send" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== Theme Toggle ==========
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('mkpro-theme', next);
            document.getElementById('themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
            // Switch highlight.js theme
            document.getElementById('hljs-theme').href = next === 'dark'
                ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
                : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
        }

        // Load saved theme
        (function() {
            const saved = localStorage.getItem('mkpro-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = saved === 'dark' ? '🌙' : '☀️';
            if (saved === 'light') {
                document.getElementById('hljs-theme').href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
            }
        })();

        // Configure marked for markdown rendering
        marked.setOptions({
            highlight: (code, lang) => {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });

        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const statusEl = document.getElementById('status');
        const attachmentsBar = document.getElementById('attachments');

        let ws = null;
        let currentMessage = null;
        let streamBuffer = '';
        let loaderEl = null;
        let pendingAttachments = []; // {name, content, type, isImage}

        // ========== Timestamp helper ==========
        function getTimestamp() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // ========== File Attachments ==========
        function handleFiles(event) {
            const files = event.target.files;
            for (const file of files) {
                const isImage = file.type.startsWith('image/');
                const reader = new FileReader();

                if (isImage) {
                    reader.onload = (e) => {
                        pendingAttachments.push({
                            name: file.name,
                            content: e.target.result, // base64 data URL
                            type: file.type,
                            isImage: true
                        });
                        renderAttachments();
                    };
                    reader.readAsDataURL(file);
                } else {
                    reader.onload = (e) => {
                        pendingAttachments.push({
                            name: file.name,
                            content: e.target.result,
                            type: file.type || 'text/plain',
                            isImage: false
                        });
                        renderAttachments();
                    };
                    reader.readAsText(file);
                }
            }
            // Reset input so same file can be re-attached
            event.target.value = '';
        }

        function renderAttachments() {
            attachmentsBar.innerHTML = pendingAttachments.map((a, i) => {
                const icon = a.isImage ? '🖼️' : (a.isPathOnly ? '📌' : '📄');
                const label = a.isPathOnly ? a.path : a.name;
                return `<div class="attachment-chip${a.isPathOnly ? ' path-only' : ''}">
                    ${icon} ${label}
                    <span class="remove" onclick="removeAttachment(${i})">✕</span>
                </div>`;
            }).join('');
        }

        function removeAttachment(index) {
            pendingAttachments.splice(index, 1);
            renderAttachments();
        }

        // ========== Loading Indicator ==========
        function showLoader() {
            if (loaderEl) return;
            loaderEl = document.createElement('div');
            loaderEl.className = 'loader';
            loaderEl.innerHTML = `
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <span class="loader-text">Thinking...</span>
            `;
            chat.appendChild(loaderEl);
            scrollToBottom();
        }

        function hideLoader() {
            if (loaderEl) {
                loaderEl.remove();
                loaderEl = null;
            }
        }

        // ========== WebSocket ==========
        function connect() {
            const wsPort = {{WS_PORT}};
            ws = new WebSocket(`ws://${location.hostname}:${wsPort}`);

            ws.onopen = () => {
                statusEl.textContent = '● Connected';
                statusEl.className = 'status connected';
                input.disabled = false;
                sendBtn.disabled = false;
            };

            ws.onclose = () => {
                statusEl.textContent = '● Disconnected';
                statusEl.className = 'status disconnected';
                input.disabled = true;
                sendBtn.disabled = true;
                setTimeout(connect, 3000);
            };

            ws.onerror = () => { ws.close(); };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'system':
                    addSystemMessage(msg.text);
                    break;
                case 'stream_start':
                    hideLoader();
                    startStreaming(msg.agent, msg.model);
                    break;
                case 'stream_chunk':
                    hideLoader();
                    appendChunk(msg.text);
                    break;
                case 'stream_end':
                    hideLoader();
                    endStreaming();
                    break;
                case 'maker':
                    addMakerMessage(msg.message);
                    break;
                case 'routing':
                    addRoutingMessage(msg.message);
                    break;
                case 'delegation':
                    if (currentMessage) {
                        const badge = currentMessage.querySelector('.agent-badge');
                        if (badge) badge.textContent = msg.agent;
                    }
                    break;
                case 'edit_proposal':
                    showEditProposal(msg);
                    break;
                case 'edit_approved':
                    resolveEditProposal(msg.id, true);
                    break;
                case 'edit_rejected':
                    resolveEditProposal(msg.id, false);
                    break;
            }
        }

        // ========== Send Message ==========
        function sendMessage() {
            const text = input.value.trim();
            if ((!text && pendingAttachments.length === 0) || !ws || ws.readyState !== WebSocket.OPEN) return;

            // Build display text
            let displayText = text;
            if (pendingAttachments.length > 0) {
                const fileNames = pendingAttachments.map(a => a.isPathOnly ? '📌 ' + a.path : a.name).join(', ');
                if (text) {
                    displayText = text + '\n📎 ' + fileNames;
                } else {
                    displayText = '📎 ' + fileNames;
                }
            }

            addUserMessage(displayText);

            // Build the actual text sent to agent
            let messageText = text;

            // For path-only attachments, prepend file references (agent uses file_read tool)
            const pathAttachments = pendingAttachments.filter(a => a.isPathOnly);
            if (pathAttachments.length > 0) {
                const fileRefs = pathAttachments.map(a => '[File: ' + a.path + ']').join(' ');
                messageText = fileRefs + (messageText ? ' ' + messageText : ' Analyze this file.');
            }

            // Build payload with content attachments only (path-only are in the text)
            const payload = { type: 'user_input', text: messageText };
            const contentAttachments = pendingAttachments.filter(a => !a.isPathOnly);
            if (contentAttachments.length > 0) {
                payload.attachments = contentAttachments.map(a => ({
                    name: a.name,
                    content: a.content,
                    type: a.type,
                    isImage: a.isImage
                }));
            }

            ws.send(JSON.stringify(payload));

            // Clear
            input.value = '';
            pendingAttachments = [];
            renderAttachments();
            input.focus();

            // Show loader
            showLoader();
        }

        // ========== Message Rendering ==========
        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `<div>${escapeHtml(text).replace(/\n/g, '<br>')}</div><div class="timestamp">${getTimestamp()}</div>`;
            chat.appendChild(div);
            scrollToBottom();
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'message system';
            div.textContent = text;
            chat.appendChild(div);
            scrollToBottom();
        }

        function addMakerMessage(text) {
            const div = document.createElement('div');
            div.className = 'message maker';
            div.textContent = text;
            chat.appendChild(div);
            scrollToBottom();
        }

        function addRoutingMessage(text) {
            const div = document.createElement('div');
            div.className = 'message routing';
            div.textContent = text;
            chat.appendChild(div);
            scrollToBottom();
        }

        function startStreaming(agent, model) {
            const div = document.createElement('div');
            div.className = 'message assistant streaming';
            div.innerHTML = `<span class="agent-badge">${agent}${model ? ' · ' + model : ''}</span><div class="content"></div><div class="timestamp">${getTimestamp()}</div>`;
            chat.appendChild(div);
            currentMessage = div;
            streamBuffer = '';
            scrollToBottom();
        }

        function appendChunk(text) {
            if (!currentMessage) {
                startStreaming('AI', '');
            }
            streamBuffer += text;
            const contentDiv = currentMessage.querySelector('.content');
            if (contentDiv) {
                contentDiv.innerHTML = marked.parse(streamBuffer);
            }
            scrollToBottom();
        }

        function endStreaming() {
            if (currentMessage) {
                currentMessage.classList.remove('streaming');
                const contentDiv = currentMessage.querySelector('.content');
                if (contentDiv) {
                    contentDiv.innerHTML = marked.parse(streamBuffer);
                    contentDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                }
            }
            currentMessage = null;
            streamBuffer = '';
        }

        function scrollToBottom() {
            chat.scrollTop = chat.scrollHeight;
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Input handling
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ========== Edit Proposals (Diff Viewer) ==========
        function showEditProposal(msg) {
            hideLoader();
            const div = document.createElement('div');
            div.className = 'edit-proposal';
            div.id = 'proposal-' + msg.id;

            let diffHtml = '';
            for (const line of (msg.diff || [])) {
                const cls = line.type === 'ADDED' ? 'added' : line.type === 'REMOVED' ? 'removed' : 'info';
                const prefix = line.type === 'ADDED' ? '+ ' : line.type === 'REMOVED' ? '- ' : '  ';
                diffHtml += `<div class="diff-line ${cls}">${prefix}${escapeHtml(line.text)}</div>`;
            }

            div.innerHTML = `
                <div class="edit-header">📝 Edit Proposal: ${escapeHtml(msg.path)} ${msg.isNewFile ? '(NEW FILE)' : ''}</div>
                <div class="diff-view">${diffHtml || '<div class="diff-line info">No changes detected</div>'}</div>
                <div class="edit-actions">
                    <button class="btn-approve" onclick="approveEdit('${msg.id}')">✓ Approve</button>
                    <button class="btn-reject" onclick="rejectEdit('${msg.id}')">✕ Reject</button>
                    <span class="edit-countdown" id="countdown-${msg.id}">Auto-approve in 7s</span>
                </div>
                <div class="timestamp">${getTimestamp()}</div>
            `;

            chat.appendChild(div);
            scrollToBottom();

            // Countdown display (actual timer runs on backend TerminalSink)
            let seconds = 7;
            const interval = setInterval(() => {
                seconds--;
                const el = document.getElementById('countdown-' + msg.id);
                if (el && seconds > 0) {
                    el.textContent = 'Auto-approve in ' + seconds + 's';
                } else {
                    clearInterval(interval);
                }
            }, 1000);
        }

        function approveEdit(id) {
            fetch('/api/edit/approve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id})
            });
        }

        function rejectEdit(id) {
            fetch('/api/edit/reject', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id})
            });
        }

        function resolveEditProposal(id, approved) {
            const el = document.getElementById('proposal-' + id);
            if (el) {
                el.classList.add('resolved');
                const header = el.querySelector('.edit-header');
                if (header) {
                    header.textContent += approved ? ' ✓ APPROVED' : ' ✕ REJECTED';
                    header.style.color = approved ? 'var(--green)' : 'var(--red)';
                }
            }
        }

        // ========== Scroll-to-Load History ==========
        let historyOffset = 0;
        let loadingHistory = false;
        let noMoreHistory = false;

        chat.addEventListener('scroll', async () => {
            if (chat.scrollTop === 0 && !loadingHistory && !noMoreHistory) {
                await loadOlderMessages();
            }
        });

        async function loadOlderMessages() {
            loadingHistory = true;
            const indicator = document.createElement('div');
            indicator.className = 'message system';
            indicator.textContent = '⏳ Loading older messages...';
            indicator.id = 'history-loader';
            chat.prepend(indicator);

            try {
                const resp = await fetch(`/api/history?offset=${historyOffset}&limit=20`);
                if (!resp.ok) throw new Error('Failed to load history');
                const data = await resp.json();

                indicator.remove();

                if (data.messages.length === 0) {
                    noMoreHistory = true;
                    return;
                }

                // Remember scroll height to preserve position
                const prevHeight = chat.scrollHeight;

                // Prepend messages (they arrive in chronological order)
                const fragment = document.createDocumentFragment();
                for (const msg of data.messages) {
                    const div = document.createElement('div');
                    if (msg.role === 'USER') {
                        div.className = 'message user';
                        div.innerHTML = `<div>${escapeHtml(msg.text)}</div><div class="timestamp">${formatHistoryTimestamp(msg.timestamp)}</div>`;
                    } else {
                        div.className = 'message assistant';
                        div.innerHTML = `<span class="agent-badge">${escapeHtml(msg.role)}</span><div class="content">${marked.parse(msg.text)}</div><div class="timestamp">${formatHistoryTimestamp(msg.timestamp)}</div>`;
                    }
                    fragment.appendChild(div);
                }
                chat.prepend(fragment);

                // Restore scroll position
                chat.scrollTop = chat.scrollHeight - prevHeight;

                historyOffset += data.messages.length;
                noMoreHistory = !data.hasMore;

            } catch (err) {
                indicator.textContent = 'Failed to load history';
                setTimeout(() => indicator.remove(), 2000);
            } finally {
                loadingHistory = false;
            }
        }

        function formatHistoryTimestamp(ts) {
            if (!ts) return '';
            try {
                // ts is like "2026-07-22T12:00:00.123"
                const d = new Date(ts);
                if (isNaN(d.getTime())) return ts.substring(11, 16); // fallback: extract HH:MM
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } catch(e) {
                return '';
            }
        }

        // ========== Resizable Dividers ==========
        function initDividers() {
            setupDivider('divider1', 'sidebar', 'left');
            setupDivider('divider2', 'previewPanel', 'left');
        }

        function setupDivider(dividerId, targetId, side) {
            const divider = document.getElementById(dividerId);
            const target = document.getElementById(targetId);
            if (!divider || !target) return;

            let startX, startWidth;

            divider.addEventListener('mousedown', (e) => {
                e.preventDefault();
                startX = e.clientX;
                startWidth = target.offsetWidth;
                divider.classList.add('active');
                // Remove transition during drag
                target.style.transition = 'none';

                const onMouseMove = (e) => {
                    const dx = e.clientX - startX;
                    const newWidth = side === 'left' ? startWidth + dx : startWidth - dx;
                    const min = parseInt(getComputedStyle(target).minWidth) || 100;
                    const max = parseInt(getComputedStyle(target).maxWidth) || 800;
                    target.style.width = Math.max(min, Math.min(max, newWidth)) + 'px';
                };

                const onMouseUp = () => {
                    divider.classList.remove('active');
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        initDividers();

        // ========== Preview Panel (Tabbed File Viewer) ==========
        const previewPanel = document.getElementById('previewPanel');
        const previewTabs = document.getElementById('previewTabs');
        const previewContent = document.getElementById('previewContent');
        const MAX_PREVIEW_TABS = 5;

        let openPreviews = []; // [{path, name, type}]
        let activePreviewPath = null;

        function openPreview(path, name) {
            // If already open, just switch to it
            const existing = openPreviews.find(p => p.path === path);
            if (existing) {
                activatePreviewTab(path);
                return;
            }

            // Max tabs — close oldest
            if (openPreviews.length >= MAX_PREVIEW_TABS) {
                openPreviews.shift();
            }

            const ext = name.split('.').pop().toLowerCase();
            openPreviews.push({ path, name, ext });
            previewPanel.classList.add('open');
            renderPreviewTabs();
            activatePreviewTab(path);
        }

        function closePreviewTab(path, event) {
            if (event) event.stopPropagation();
            openPreviews = openPreviews.filter(p => p.path !== path);
            if (openPreviews.length === 0) {
                closePreviewPanel();
            } else {
                if (activePreviewPath === path) {
                    activatePreviewTab(openPreviews[openPreviews.length - 1].path);
                }
                renderPreviewTabs();
            }
        }

        function closePreviewPanel() {
            previewPanel.classList.remove('open');
            openPreviews = [];
            activePreviewPath = null;
            previewTabs.innerHTML = '';
            previewContent.innerHTML = '';
        }

        function renderPreviewTabs() {
            previewTabs.innerHTML = openPreviews.map(p =>
                `<div class="preview-tab ${p.path === activePreviewPath ? 'active' : ''}" onclick="activatePreviewTab('${p.path}')">
                    ${getFileIcon(p.name)} ${p.name}
                    <span class="close-tab" onclick="closePreviewTab('${p.path}', event)">✕</span>
                </div>`
            ).join('');
        }

        async function activatePreviewTab(path) {
            activePreviewPath = path;
            renderPreviewTabs();

            const preview = openPreviews.find(p => p.path === path);
            if (!preview) return;

            previewContent.innerHTML = '<div style="padding:20px;color:var(--text-dim)">Loading...</div>';

            const ext = preview.ext;
            const imageExts = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg'];
            const codeExts = ['java', 'py', 'js', 'ts', 'json', 'yaml', 'yml', 'xml', 'html', 'css', 'sh', 'bat', 'sql', 'groovy', 'kt', 'swift', 'rs', 'go', 'c', 'cpp', 'h', 'md', 'txt', 'log', 'csv', 'toml', 'properties'];

            if (ext === 'pdf') {
                // PDF: embed via iframe
                previewContent.innerHTML = `<iframe src="/api/file-raw?path=${encodeURIComponent(path)}"></iframe>`;
            } else if (imageExts.includes(ext)) {
                // Images/SVG: inline
                previewContent.innerHTML = `<img src="/api/file-raw?path=${encodeURIComponent(path)}" alt="${preview.name}" />`;
            } else if (ext === 'stl' || ext === 'obj') {
                // 3D: three.js viewer
                render3DPreview(path, ext);
            } else if (codeExts.includes(ext)) {
                // Code: syntax highlighted
                try {
                    const resp = await fetch('/api/file-content?path=' + encodeURIComponent(path));
                    const data = await resp.json();
                    const lang = getHighlightLang(ext);
                    let highlighted;
                    if (lang && hljs.getLanguage(lang)) {
                        highlighted = hljs.highlight(data.content || '', { language: lang }).value;
                    } else {
                        highlighted = hljs.highlightAuto(data.content || '').value;
                    }
                    previewContent.innerHTML = `<pre><code class="hljs">${highlighted}</code></pre>`;
                } catch (err) {
                    previewContent.innerHTML = `<div style="padding:20px;color:var(--red)">Error: ${err.message}</div>`;
                }
            } else {
                // Fallback: raw text
                try {
                    const resp = await fetch('/api/file-content?path=' + encodeURIComponent(path));
                    const data = await resp.json();
                    previewContent.innerHTML = `<pre>${escapeHtml(data.content || 'Empty file')}</pre>`;
                } catch (err) {
                    previewContent.innerHTML = `<div style="padding:20px;color:var(--red)">Cannot preview this file type</div>`;
                }
            }
        }

        function render3DPreview(path, ext) {
            if (typeof THREE === 'undefined') {
                previewContent.innerHTML = '<div style="padding:20px;color:var(--yellow)">three.js not loaded. Cannot render 3D.</div>';
                return;
            }

            previewContent.innerHTML = '<canvas id="threeCanvas"></canvas>';
            const canvas = document.getElementById('threeCanvas');
            const width = previewContent.clientWidth || 400;
            const height = previewContent.clientHeight || 300;

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1b26);
            const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(width, height);

            // Lights
            scene.add(new THREE.AmbientLight(0x404040));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);

            // Load STL
            fetch('/api/file-raw?path=' + encodeURIComponent(path))
                .then(r => r.arrayBuffer())
                .then(buffer => {
                    let geometry;
                    if (ext === 'stl') {
                        geometry = parseSTL(buffer);
                    } else {
                        // OBJ — simplified (render bounding box placeholder)
                        geometry = new THREE.BoxGeometry(1, 1, 1);
                    }

                    const material = new THREE.MeshPhongMaterial({ color: 0x7aa2f7, flatShading: true });
                    const mesh = new THREE.Mesh(geometry, material);

                    // Center and fit
                    geometry.computeBoundingBox();
                    const box = geometry.boundingBox;
                    const center = box.getCenter(new THREE.Vector3());
                    mesh.position.sub(center);

                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    camera.position.set(0, 0, maxDim * 2);

                    scene.add(mesh);

                    // Animate (slow rotation)
                    function animate() {
                        requestAnimationFrame(animate);
                        mesh.rotation.y += 0.005;
                        renderer.render(scene, camera);
                    }
                    animate();
                })
                .catch(err => {
                    previewContent.innerHTML = `<div style="padding:20px;color:var(--red)">3D load error: ${err.message}</div>`;
                });
        }

        function parseSTL(buffer) {
            // Binary STL parser
            const dv = new DataView(buffer);
            const triangles = dv.getUint32(80, true);
            const positions = new Float32Array(triangles * 9);

            let offset = 84;
            for (let i = 0; i < triangles; i++) {
                offset += 12; // skip normal
                for (let j = 0; j < 9; j++) {
                    positions[i * 9 + j] = dv.getFloat32(offset, true);
                    offset += 4;
                }
                offset += 2; // attribute byte count
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.computeVertexNormals();
            return geometry;
        }

        function attachPreviewFile() {
            if (activePreviewPath) {
                const preview = openPreviews.find(p => p.path === activePreviewPath);
                if (preview) {
                    attachFilePath(activePreviewPath, preview.name);
                }
            }
        }

        function getHighlightLang(ext) {
            const map = { java:'java', py:'python', js:'javascript', ts:'typescript', json:'json',
                yaml:'yaml', yml:'yaml', xml:'xml', html:'html', css:'css', sh:'bash', bat:'dos',
                sql:'sql', groovy:'groovy', kt:'kotlin', swift:'swift', rs:'rust', go:'go',
                c:'c', cpp:'cpp', h:'c', md:'markdown', toml:'ini', properties:'properties' };
            return map[ext] || null;
        }

        // ========== File Browser ==========
        const fileTree = document.getElementById('fileTree');
        const sidebar = document.getElementById('sidebar');

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }

        const FILE_ICONS = {
            'java': '☕', 'py': '🐍', 'js': '🟨', 'ts': '🔷', 'json': '📋',
            'yaml': '⚙️', 'yml': '⚙️', 'md': '📝', 'xml': '📄', 'html': '🌐',
            'css': '🎨', 'sql': '🗃️', 'sh': '🐚', 'bat': '🖥️', 'groovy': '⭐',
            'kt': '🟣', 'swift': '🦅', 'rs': '🦀', 'go': '🐹', 'c': '©️',
            'cpp': '➕', 'h': '📐', 'png': '🖼️', 'jpg': '🖼️', 'gif': '🖼️'
        };

        function getFileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            return FILE_ICONS[ext] || '📄';
        }

        async function loadDirectory(path, container, depth) {
            try {
                const url = '/api/files' + (path ? '?path=' + encodeURIComponent(path) : '');
                const resp = await fetch(url);
                if (!resp.ok) return;
                const data = await resp.json();

                for (const entry of data.entries) {
                    const fullPath = path ? path + '/' + entry.name : entry.name;
                    const isDir = entry.type === 'directory';

                    const itemDiv = document.createElement('div');
                    itemDiv.style.paddingLeft = (depth * 16 + 12) + 'px';

                    if (isDir) {
                        itemDiv.className = 'tree-item';
                        itemDiv.innerHTML = `<span class="arrow">▶</span><span class="icon">📁</span><span class="name dir">${entry.name}</span>`;

                        const childrenDiv = document.createElement('div');
                        childrenDiv.className = 'tree-children';

                        let loaded = false;
                        itemDiv.onclick = async (e) => {
                            e.stopPropagation();
                            const arrow = itemDiv.querySelector('.arrow');
                            if (childrenDiv.classList.contains('open')) {
                                childrenDiv.classList.remove('open');
                                arrow.classList.remove('expanded');
                            } else {
                                if (!loaded) {
                                    await loadDirectory(fullPath, childrenDiv, depth + 1);
                                    loaded = true;
                                }
                                childrenDiv.classList.add('open');
                                arrow.classList.add('expanded');
                            }
                        };

                        container.appendChild(itemDiv);
                        container.appendChild(childrenDiv);
                    } else {
                        itemDiv.className = 'tree-item';
                        itemDiv.innerHTML = `<span class="arrow" style="visibility:hidden">▶</span><span class="icon">${getFileIcon(entry.name)}</span><span class="name file">${entry.name}</span>`;

                        // Single click: open in preview panel
                        itemDiv.onclick = (e) => {
                            e.stopPropagation();
                            document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
                            itemDiv.classList.add('active');
                            openPreview(fullPath, entry.name);
                        };

                        // Double-click: attach path to chat
                        itemDiv.ondblclick = async (e) => {
                            e.stopPropagation();
                            attachFilePath(fullPath, entry.name);
                        };

                        container.appendChild(itemDiv);
                    }
                }
            } catch (err) {
                console.error('Failed to load directory:', path, err);
            }
        }

        /**
         * Attach file by path only (single click) — agent uses file_read tool to access it.
         * More efficient: no token waste, agent reads on demand.
         */
        function attachFilePath(path, name) {
            // Remove any existing path-only attachment for the same file
            pendingAttachments = pendingAttachments.filter(a => !(a.isPathOnly && a.path === path));

            pendingAttachments.push({
                name: name,
                path: path,
                content: null,
                type: 'path',
                isImage: false,
                isPathOnly: true
            });
            renderAttachments();
        }

        /**
         * Attach full file content (double-click) — content sent directly in prompt.
         * Use when you explicitly want the content included.
         */
        async function attachFileContent(path, name) {
            try {
                const resp = await fetch('/api/file-content?path=' + encodeURIComponent(path));
                if (!resp.ok) return;
                const data = await resp.json();

                // Remove path-only attachment if replacing with content
                pendingAttachments = pendingAttachments.filter(a => !(a.isPathOnly && a.path === path));

                pendingAttachments.push({
                    name: name,
                    path: path,
                    content: data.content,
                    type: 'text/plain',
                    isImage: false,
                    isPathOnly: false
                });
                renderAttachments();
            } catch (err) {
                console.error('Failed to read file:', path, err);
            }
        }

        // Load root directory on startup
        loadDirectory('', fileTree, 0);

        // Start connection
        connect();
    </script>
</body>
</html>
